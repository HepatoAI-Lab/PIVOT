output_dir: outputs

paths:
  triad_repo: ../Triad
  triad_checkpoint: ../Triad/weights/Triad-SwinB-SimMIM.pth
  gigapath_repo: ../prov-gigapath
  gigapath_tile_checkpoint: ../prov-gigapath/hf_weights/pytorch_model.bin
  gigapath_slide_checkpoint: ../prov-gigapath/hf_weights/slide_encoder.pth
  liver_tumor_segmentor: ../LiverTumorSegmentor

data:
  manifest_csv: data/pivot_manifest.csv
  train_split: train
  val_split: val
  test_split: test
  sequences:
    - T1WI
    - T2WI
    - DWI
    - ADC
    - AP
    - PVP
    - DP

model:
  model_dim: 768
  reference_dim: 768
  adapter_bottleneck_dim: 128
  sequence_transformer_layers: 2
  sequence_transformer_heads: 8

pathology:
  slide_embedding_dim: 768
  patient_hidden_dim: 256

preprocessing:
  reference_sequence: PVP
  target_spacing:
    - 1.5
    - 1.5
    - 3.0
  crop_size:
    - 96
    - 160
    - 160
  tile_size: 256
  wsi_level: 0

training:
  device: cuda
  num_workers: 4
  pathology_batch_size: 16
  pathology_epochs: 50
  pathology_lr: 0.0001
  mri_batch_size: 2
  alignment_epochs: 20
  joint_epochs: 80
  new_module_lr: 0.0001
  backbone_lr: 0.00001
  weight_decay: 0.00001
  lambda_morph: 0.5
  lambda_vasc: 0.5
